<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fermentation Chart</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #191919;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh; padding: 20px;
  }
  .card {
    background: #202020; border-radius: 12px; border: 1px solid #2e2e2e;
    padding: 32px; width: 100%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3), 0 8px 32px rgba(0,0,0,0.3);
  }
  .card-title { font-size: 15px; font-weight: 600; color: #e8e8e6; letter-spacing: -0.01em; font-family: 'DM Mono', monospace; }
  .card-subtitle { font-size: 12px; color: #5a5a58; margin-top: 3px; font-family: 'DM Mono', monospace; }
  .legend { display: flex; gap: 18px; margin-top: 14px; margin-bottom: 24px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #7a7a78; font-family: 'DM Mono', monospace; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-dash { width: 18px; height: 2px; flex-shrink: 0;
    background: repeating-linear-gradient(90deg,#a83d52 0,#a83d52 5px,transparent 5px,transparent 9px); }
  .chart-wrap { position: relative; width: 100%; }
  svg { width: 100%; overflow: visible; }
  .tooltip {
    position: absolute; background: #2c2c2c; border: 1px solid #3a3a3a;
    color: #e0e0de; padding: 9px 12px; border-radius: 8px; font-size: 12px;
    line-height: 1.7; pointer-events: none; opacity: 0; transition: opacity 0.12s ease;
    white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 10;
  }
  .tooltip.visible { opacity: 1; }
  .tdot { display:inline-block; width:7px; height:7px; border-radius:50%;
          margin-right:5px; vertical-align:middle; position:relative; top:-1px; }
  .state-wrap { text-align: center; padding: 48px 0; }
  .state-text { font-size: 13px; color: #5a5a58; }
  .error-title { font-size: 14px; font-weight: 600; color: #e8e8e6; margin-bottom: 8px; }
  .error-msg { font-size: 13px; color: #5a5a58; line-height: 1.6; }
  .error-msg code {
    font-family: 'Menlo', 'Monaco', monospace;
    background: #2a2a2a; padding: 2px 5px; border-radius: 4px; color: #9a9a98;
  }
</style>
</head>
<body>
<div id="app">
  <div class="card">
    <div class="state-wrap"><div class="state-text">Loading&hellip;</div></div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  var params     = new URLSearchParams(window.location.search);
  var batch      = params.get("batch");
  var setpoint   = params.get("setpoint")   !== null ? parseFloat(params.get("setpoint"))   : null;
  var targetBrix = params.get("targetbrix") !== null ? parseFloat(params.get("targetbrix")) : null;
  var title      = params.get("title") || batch;
  var app      = document.getElementById("app");

  function escHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function showError(msg) {
    app.innerHTML =
      '<div class="card">' +
        '<div class="state-wrap">' +
          '<div class="error-title">Unable to load chart</div>' +
          '<div class="error-msg">' + msg + '</div>' +
        '</div>' +
      '</div>';
  }

  if (!batch) {
    showError('No batch specified. Add <code>?batch=Batch+2601</code> to the URL.');
    return;
  }

  var isLocal  = location.hostname === "localhost" || location.hostname === "127.0.0.1";
  var fetchUrl = isLocal
    ? "http://localhost:3000/api/data?batch=" + encodeURIComponent(batch)
    : "/.netlify/functions/data?batch="       + encodeURIComponent(batch);

  fetch(fetchUrl)
    .then(function (res) {
      return res.json().then(function (json) {
        if (!res.ok) throw new Error(json.error || "HTTP " + res.status);
        return json;
      });
    })
    .then(function (data) {
      if (!Array.isArray(data) || data.length < 2) {
        showError(
          "Not enough data found for batch <code>" + escHtml(batch) + "</code>. " +
          "At least 2 readings are required to render the chart."
        );
        return;
      }
      renderChart(data);
    })
    .catch(function (e) {
      var hint = isLocal
        ? '<br><span style="color:#3a3a38;font-size:11px;margin-top:6px;display:block">' +
          'Make sure the proxy is running: <code>node server.js</code></span>'
        : '';
      showError("Failed to fetch data: " + escHtml(e.message) + hint);
    });

  // ─── Chart renderer ──────────────────────────────────────────────────────

  function formatDate(isoDate) {
    var d = new Date(isoDate + "T12:00:00");
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  }

  function renderChart(rawData) {
    var data = rawData.map(function (r) {
      return {
        date:  formatDate(r.date),
        brix:  r.brix,
        temp:  r.temp,
        ph:    r.ph  != null ? r.ph  : null,
        notes: r.notes || null,
      };
    });

    var n = data.length;

    // Auto-scale both axes with 10% padding around the data range
    var brixVals    = data.map(function (d) { return d.brix; });
    var tempVals    = data.map(function (d) { return d.temp; });
    var brixDataMin = Math.min.apply(null, brixVals);
    var brixDataMax = Math.max.apply(null, brixVals);
    var tempDataMin = Math.min.apply(null, tempVals);
    var tempDataMax = Math.max.apply(null, tempVals);
    var brixRange   = brixDataMax - brixDataMin || 1;
    var tempRange   = tempDataMax - tempDataMin || 1;
    var brixMin     = targetBrix !== null ? targetBrix - brixRange * 0.1 : brixDataMin - brixRange * 0.1;
    var brixMax     = brixDataMax + brixRange * 0.1;
    var tempMin     = tempDataMin - tempRange * 0.1;
    var tempMax     = tempDataMax + tempRange * 0.1;

    // Expand temp range to keep the setpoint line visible
    if (setpoint !== null && !isNaN(setpoint)) {
      if (setpoint < tempMin) tempMin = setpoint - tempRange * 0.08;
      if (setpoint > tempMax) tempMax = setpoint + tempRange * 0.08;
    }

    var W = 740, H = 300;
    var PAD = { top: 24, right: 64, bottom: 40, left: 60 };
    var chartW      = W - PAD.left - PAD.right;
    var chartH      = H - PAD.top  - PAD.bottom;
    var chartBottom = PAD.top + chartH;

    function xPos(i)  { return PAD.left + (i / (n - 1)) * chartW; }
    function yBrix(b) { return PAD.top + (1 - (b - brixMin) / (brixMax - brixMin)) * chartH; }
    function yTemp(t) { return PAD.top + (1 - (t - tempMin) / (tempMax - tempMin)) * chartH; }

    // Catmull-Rom smooth path (identical to reference)
    function smoothPath(pts) {
      if (pts.length < 2) return "";
      var d = "M " + pts[0].x + "," + pts[0].y;
      for (var i = 0; i < pts.length - 1; i++) {
        var p0 = pts[Math.max(0, i - 1)];
        var p1 = pts[i];
        var p2 = pts[i + 1];
        var p3 = pts[Math.min(pts.length - 1, i + 2)];
        var cp1x = p1.x + (p2.x - p0.x) / 6;
        var cp1y = p1.y + (p2.y - p0.y) / 6;
        var cp2x = p2.x - (p3.x - p1.x) / 6;
        var cp2y = p2.y - (p3.y - p1.y) / 6;
        d += " C " + cp1x + "," + cp1y + " " + cp2x + "," + cp2y + " " + p2.x + "," + p2.y;
      }
      return d;
    }

    // Build legend HTML (setpoint entry only when param is present)
    var legendHtml =
      '<div class="legend-item"><div class="legend-dot" style="background:#6e9fff"></div>Brix (&deg;Bx)</div>' +
      '<div class="legend-item"><div class="legend-dot" style="background:#f0607a"></div>Temperature (&deg;F)</div>';
    if (setpoint !== null && !isNaN(setpoint)) {
      legendHtml += '<div class="legend-item"><div class="legend-dash"></div>Set Point (' + setpoint + '&deg;F)</div>';
    }
    if (targetBrix !== null && !isNaN(targetBrix)) {
      legendHtml += '<div class="legend-item"><div class="legend-dash" style="background:repeating-linear-gradient(90deg,#4a6eb5 0,#4a6eb5 5px,transparent 5px,transparent 9px);opacity:0.6"></div>Target Brix (' + targetBrix + '&deg;Bx)</div>';
    }

    app.innerHTML =
      '<div class="card">' +
        '<div class="card-title">'    + escHtml(title || batch) + '</div>' +
        '<div class="card-subtitle">Brix &amp; temperature over time</div>' +
        '<div class="legend">' + legendHtml + '</div>' +
        '<div class="chart-wrap">' +
          '<svg id="chart" viewBox="0 0 740 300" preserveAspectRatio="xMidYMid meet"></svg>' +
          '<div class="tooltip" id="tooltip"></div>' +
        '</div>' +
      '</div>';

    var svg = document.getElementById("chart");
    var ns  = "http://www.w3.org/2000/svg";

    function el(tag, attrs, text) {
      var e = document.createElementNS(ns, tag);
      if (attrs) Object.keys(attrs).forEach(function (k) { e.setAttribute(k, attrs[k]); });
      if (text !== undefined) e.textContent = text;
      return e;
    }

    // ── Defs: gradients + clipPath ──────────────────────────────────────────
    var defs = el("defs");

    var gBrix = el("linearGradient", { id:"gradBrix", x1:"0", y1:"0", x2:"0", y2:"1" });
    gBrix.appendChild(el("stop", { offset:"0%",   "stop-color":"#6e9fff", "stop-opacity":"0.28" }));
    gBrix.appendChild(el("stop", { offset:"100%", "stop-color":"#6e9fff", "stop-opacity":"0.02" }));
    defs.appendChild(gBrix);

    var gTemp = el("linearGradient", { id:"gradTemp", x1:"0", y1:"0", x2:"0", y2:"1" });
    gTemp.appendChild(el("stop", { offset:"0%",   "stop-color":"#f0607a", "stop-opacity":"0.22" }));
    gTemp.appendChild(el("stop", { offset:"100%", "stop-color":"#f0607a", "stop-opacity":"0.02" }));
    defs.appendChild(gTemp);

    // clipPath keeps the easeOutBack overshoot from escaping the chart area
    var clip = el("clipPath", { id:"chartClip" });
    clip.appendChild(el("rect", { x: PAD.left, y: PAD.top - 10, width: chartW, height: chartH + 10 }));
    defs.appendChild(clip);

    svg.appendChild(defs);

    // ── Horizontal grid lines + y-axis labels ───────────────────────────────
    for (var gi = 0; gi <= 5; gi++) {
      var gy = PAD.top + (gi / 5) * chartH;
      svg.appendChild(el("line", { x1:PAD.left, y1:gy, x2:PAD.left+chartW, y2:gy,
        stroke:"#2a2a2a", "stroke-width":"1", "stroke-dasharray":"3 4" }));
      var bvRaw     = brixMax - (gi / 5) * (brixMax - brixMin);
      var bvRounded = (Math.round(bvRaw * 2) / 2).toFixed(1); // nearest 0.5
      if (targetBrix === null || bvRaw >= targetBrix) {
        svg.appendChild(el("text", { x:PAD.left-8, y:gy+4, "text-anchor":"end",
          fill:"#4e4e4c", "font-size":"12", "font-family":"'DM Mono', monospace" }, bvRounded));
      }
      var tvRounded = Math.round(tempMax - (gi / 5) * (tempMax - tempMin)); // whole number
      svg.appendChild(el("text", { x:PAD.left+chartW+8, y:gy+4, "text-anchor":"start",
        fill:"#4e4e4c", "font-size":"12", "font-family":"'DM Mono', monospace" }, tvRounded + "°"));
    }

    // ── Axis titles ─────────────────────────────────────────────────────────
    svg.appendChild(el("text", {
      x: PAD.left-44, y: PAD.top+chartH/2, "text-anchor":"middle",
      transform: "rotate(-90," + (PAD.left-44) + "," + (PAD.top+chartH/2) + ")",
      fill:"#3a3a38", "font-size":"12", "font-family":"'DM Mono', monospace"
    }, "Brix (°Bx)"));
    svg.appendChild(el("text", {
      x: PAD.left+chartW+52, y: PAD.top+chartH/2, "text-anchor":"middle",
      transform: "rotate(90," + (PAD.left+chartW+52) + "," + (PAD.top+chartH/2) + ")",
      fill:"#3a3a38", "font-size":"12", "font-family":"'DM Mono', monospace"
    }, "Temp (°F)"));

    // ── Setpoint reference line (only when ?setpoint= is provided) ──────────
    if (setpoint !== null && !isNaN(setpoint)) {
      var refY = yTemp(setpoint);
      svg.appendChild(el("line", { x1:PAD.left, y1:refY, x2:PAD.left+chartW, y2:refY,
        stroke:"#a83d52", "stroke-width":"1.5", "stroke-dasharray":"5 4" }));
      svg.appendChild(el("text", { x:PAD.left+chartW-2, y:refY-5, "text-anchor":"end",
        fill:"#a83d52", "font-size":"11", "font-family":"'DM Mono', monospace", "font-weight":"500"
      }, "Set Point (" + setpoint + "°F)"));
    }

    // ── Target Brix reference line (only when ?targetbrix= is provided) ───────
    if (targetBrix !== null && !isNaN(targetBrix)) {
      var tbY = yBrix(targetBrix);
      svg.appendChild(el("line", {
        x1: PAD.left, y1: tbY, x2: PAD.left + chartW, y2: tbY,
        stroke: "#4a6eb5", "stroke-width": "1.5", "stroke-dasharray": "5 4",
        "stroke-opacity": "0.6"
      }));
      svg.appendChild(el("text", {
        x: PAD.left + chartW - 4, y: tbY + 14, "text-anchor": "end",
        fill: "#4a6eb5", "font-size": "11", "font-family": "'DM Mono', monospace",
        "font-weight": "500", "fill-opacity": "0.8"
      }, "Target (" + targetBrix + "°Bx)"));
    }

    // ── X-axis labels + vertical grid ───────────────────────────────────────
    // Thin labels if there are many data points — show at most ~8
    var xStep = Math.max(1, Math.ceil(n / 8));
    data.forEach(function (d, i) {
      var x = xPos(i);
      svg.appendChild(el("line", { x1:x, y1:PAD.top, x2:x, y2:chartBottom,
        stroke:"#2a2a2a", "stroke-width":"1", "stroke-dasharray":"3 4" }));
      if (i % xStep === 0 || i === n - 1) {
        svg.appendChild(el("text", { x:x, y:chartBottom+16, "text-anchor":"middle",
          fill:"#4e4e4c", "font-size":"12", "font-family":"'DM Mono', monospace" }, d.date));
      }
    });

    // ── Animated paths (clipped so overshoot stays inside chart) ────────────
    var chartGroup   = el("g", { "clip-path":"url(#chartClip)" });
    var brixAreaPath = el("path", { fill:"url(#gradBrix)", stroke:"none" });
    var tempAreaPath = el("path", { fill:"url(#gradTemp)", stroke:"none" });
    var brixLinePath = el("path", { fill:"none", stroke:"#6e9fff", "stroke-width":"2",
      "stroke-linecap":"round", "stroke-linejoin":"round" });
    var tempLinePath = el("path", { fill:"none", stroke:"#f0607a", "stroke-width":"2",
      "stroke-linecap":"round", "stroke-linejoin":"round" });
    chartGroup.appendChild(brixAreaPath);
    chartGroup.appendChild(tempAreaPath);
    chartGroup.appendChild(brixLinePath);
    chartGroup.appendChild(tempLinePath);
    svg.appendChild(chartGroup);

    // ── Dots + hover targets ─────────────────────────────────────────────────
    var tooltip   = document.getElementById("tooltip");
    var chartWrap = document.querySelector(".chart-wrap");
    var bDots = [], tDots = [];
    var colW  = chartW / (n - 1);

    data.forEach(function (d, i) {
      var x    = xPos(i);
      var bDot = el("circle", { cx:x, cy:chartBottom, r:"3.5",
        fill:"#202020", stroke:"#6e9fff", "stroke-width":"2" });
      var tDot = el("circle", { cx:x, cy:chartBottom, r:"3.5",
        fill:"#202020", stroke:"#f0607a", "stroke-width":"2" });
      var hit = el("rect", {
        x: x - colW/2, y: PAD.top, width: colW, height: chartH,
        fill:"transparent", style:"cursor:crosshair"
      });
      svg.appendChild(bDot);
      svg.appendChild(tDot);
      svg.appendChild(hit);
      bDots.push(bDot);
      tDots.push(tDot);

      hit.addEventListener("mouseenter", function () {
        bDot.setAttribute("r", "5");
        tDot.setAttribute("r", "5");
        var ttHtml =
          '<div style="font-weight:600;margin-bottom:6px;color:#aaa">' + d.date + '</div>' +
          '<div style="border-top:1px solid #3a3a3a;margin-bottom:6px"></div>' +
          '<div><span class="tdot" style="background:#6e9fff"></span>Brix: <strong style="font-family:\'DM Mono\',monospace">' + d.brix.toFixed(1) + '&deg;Bx</strong></div>' +
          '<div><span class="tdot" style="background:#f0607a"></span>Temp: <strong style="font-family:\'DM Mono\',monospace">' + d.temp.toFixed(1) + '&deg;F</strong></div>';
        if (d.ph !== null) {
          ttHtml += '<div><span class="tdot" style="background:#a78bfa"></span>pH: <strong style="font-family:\'DM Mono\',monospace">' + d.ph.toFixed(2) + '</strong></div>';
        }
        tooltip.innerHTML = ttHtml;
        tooltip.classList.add("visible");
      });
      hit.addEventListener("mousemove", function (e) {
        var r = chartWrap.getBoundingClientRect();
        tooltip.style.left = (e.clientX - r.left + 14) + "px";
        tooltip.style.top  = (e.clientY - r.top  - 10) + "px";
      });
      hit.addEventListener("mouseleave", function () {
        bDot.setAttribute("r", "3.5");
        tDot.setAttribute("r", "3.5");
        tooltip.classList.remove("visible");
      });
    });

    // ── Animation ────────────────────────────────────────────────────────────
    var brixPts = data.map(function (d, i) { return { x: xPos(i), y: yBrix(d.brix) }; });
    var tempPts = data.map(function (d, i) { return { x: xPos(i), y: yTemp(d.temp) }; });

    var DURATION = 900;
    var STAGGER  = 220;

    function easeOutBack(t) {
      var c1 = 1.4, c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }
    function interpY(targetY, progress) {
      var p = Math.min(1, Math.max(0, progress));
      return chartBottom + (targetY - chartBottom) * easeOutBack(p);
    }
    function buildPaths(pts, progress) {
      var interped = pts.map(function (pt) { return { x: pt.x, y: interpY(pt.y, progress) }; });
      var line = smoothPath(interped);
      var area = line + " L " + interped[n-1].x + "," + chartBottom +
                        " L " + interped[0].x  + "," + chartBottom + " Z";
      return { line: line, area: area };
    }

    var startTime = null;
    function animate(ts) {
      if (!startTime) startTime = ts;
      var elapsed = ts - startTime;
      var bP = Math.min(1, elapsed / DURATION);
      var tP = Math.min(1, Math.max(0, (elapsed - STAGGER) / DURATION));

      var b = buildPaths(brixPts, bP);
      brixLinePath.setAttribute("d", b.line);
      brixAreaPath.setAttribute("d", b.area);
      bDots.forEach(function (dot, i) { dot.setAttribute("cy", interpY(brixPts[i].y, bP)); });

      var t = buildPaths(tempPts, tP);
      tempLinePath.setAttribute("d", t.line);
      tempAreaPath.setAttribute("d", t.area);
      tDots.forEach(function (dot, i) { dot.setAttribute("cy", interpY(tempPts[i].y, tP)); });

      if (bP < 1 || tP < 1) requestAnimationFrame(animate);
    }

    // Small delay ensures SVG is in the DOM and painted before rAF kicks off (Firefox compat)
    setTimeout(function () { requestAnimationFrame(animate); }, 50);
  }

});
</script>
</body>
</html>
